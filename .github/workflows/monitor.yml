name: Monitor Citas Panama-Cuba

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Revisar citas disponibles
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GREEN_INSTANCE: ${{ secrets.GREEN_INSTANCE }}
          GREEN_TOKEN: ${{ secrets.GREEN_TOKEN }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: python check_citas.py
